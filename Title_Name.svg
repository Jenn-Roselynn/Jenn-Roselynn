<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P');
      text {
        font-family: 'Press Start 2P', 'Courier New', monospace;
        font-size: 22px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .star { filter: drop-shadow(0 0 2px white); }
    </style>

    <!-- Retro Sweep Gradient -->
    <linearGradient id="segaSweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2222ff"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#2222ff"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-800 0; 800 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Star Shape (4-pointed sparkle) -->
    <symbol id="sparkle" viewBox="0 0 10 10">
      <path d="M5 0 L6 4 L10 5 L6 6 L5 10 L4 6 L0 5 L4 4 Z" fill="white"/>
    </symbol>

    <!-- Scanline Overlay -->
    <pattern id="crt" width="800" height="4" patternUnits="userSpaceOnUse">
      <rect width="800" height="2" fill="black" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="800" height="200" fill="#000000"/>

  <!-- Star Trail Orbiting the Text -->
  <g class="star-container">
    <!-- Star 1: Rainbow Cycle -->
    <use href="#sparkle" width="12" height="12">
      <animateMotion path="M150,70 L650,70 L650,130 L150,130 Z" dur="4s" repeatCount="indefinite" />
      <animate attributeName="fill" values="#ff0000;#ffff00;#00ff00;#00ffff;#0000ff;#ff00ff;#ff0000" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.5;1" dur="0.2s" repeatCount="indefinite" />
    </use>
    <!-- Star 2: Offset -->
    <use href="#sparkle" width="10" height="10">
      <animateMotion path="M150,70 L650,70 L650,130 L150,130 Z" dur="4s" begin="1s" repeatCount="indefinite" />
      <animate attributeName="fill" values="#ffff00;#00ff00;#00ffff;#0000ff;#ff00ff;#ff0000;#ffff00" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0;1" dur="0.3s" repeatCount="indefinite" />
    </use>
    <!-- Star 3: Offset -->
    <use href="#sparkle" width="8" height="8">
      <animateMotion path="M150,70 L650,70 L650,130 L150,130 Z" dur="4s" begin="2s" repeatCount="indefinite" />
      <animate attributeName="fill" values="#00ffff;#ff0000;#ffff00" dur="1.5s" repeatCount="indefinite" />
    </use>
    <!-- Star 4: Offset -->
    <use href="#sparkle" width="12" height="12">
      <animateMotion path="M150,70 L650,70 L650,130 L150,130 Z" dur="4s" begin="3s" repeatCount="indefinite" />
      <animate attributeName="fill" values="#ffffff;#0000ff;#ffffff" dur="0.8s" repeatCount="indefinite" />
    </use>
  </g>

  <!-- Title Name with Slower Jumps -->
  <g text-anchor="middle" transform="translate(400, 110)">
    <!-- J -->
    <text x="-220" y="0" fill="url(#segaSweep)">J<animate attributeName="y" values="0;-25;0" dur="2s" begin="0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" /></text>
    <!-- E -->
    <text x="-190" y="0" fill="url(#segaSweep)">E<animate attributeName="y" values="0;-25;0" dur="2s" begin="0.1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" /></text>
    <!-- N -->
    <text x="-160" y="0" fill="url(#segaSweep)">N<animate attributeName="y" values="0;-25;0" dur="2s" begin="0.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" /></text>
    <!-- N -->
    <text x="-130" y="0" fill="url(#segaSweep)">N<animate attributeName="y" values="0;-25;0" dur="2s" begin="0.3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" /></text>
    <!-- - -->
    <text x="-100" y="0" fill="white">-<animate attributeName="y" values="0;-15;0" dur="2s" begin="0.4s" repeatCount="indefinite" /></text>
    <!-- R -->
    <text x="-70" y="0" fill="url(#segaSweep)">R<animate attributeName="y" values="0;-25;0" dur="2s" begin="0.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" /></text>
    <!-- O -->
    <text x="-40" y="0" fill="url(#segaSweep)">O<animate attributeName="y" values="0;-25;0" dur="2s" begin="0.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" /></text>
    <!-- S -->
    <text x="-10" y="0" fill="url(#segaSweep)">S<animate attributeName="y" values="0;-25;0" dur="2s" begin="0.7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" /></text>
    <!-- E -->
    <text x="20" y="0" fill="url(#segaSweep)">E<animate attributeName="y" values="0;-25;0" dur="2s" begin="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" /></text>
    <!-- L -->
    <text x="50" y="0" fill="url(#segaSweep)">L<animate attributeName="y" values="0;-25;0" dur="2s" begin="0.9s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" /></text>
    <!-- Y -->
    <text x="80" y="0" fill="url(#segaSweep)">Y<animate attributeName="y" values="0;-25;0" dur="2s" begin="1.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" /></text>
    <!-- N -->
    <text x="110" y="0" fill="url(#segaSweep)">N<animate attributeName="y" values="0;-25;0" dur="2s" begin="1.1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" /></text>
    <!-- N -->
    <text x="140" y="0" fill="url(#segaSweep)">N<animate attributeName="y" values="0;-25;0" dur="2s" begin="1.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" /></text>
  </g>

  <rect width="800" height="200" fill="url(#crt)" pointer-events="none"/>
</svg>
